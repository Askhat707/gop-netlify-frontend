name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            https://askhat777-gld-options-live-dashboard.hf.space/health)
          echo "Status: $STATUS"
